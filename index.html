<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Malingssporing" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3Ctext x='16' y='23' font-size='20' font-family='sans-serif' font-weight='bold' fill='%23fbbf24' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E" />
  <title>Malingssporing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect } = React;

    function Icon({ name, size = 18, className = "" }) {
      const p = {
        eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></>,
        clipboard: <><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></>,
        truck: <><path d="M14 17V5a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v11"/><path d="M14 9h4l3 3v5h-2"/><circle cx="6.5" cy="17.5" r="1.5"/><circle cx="17.5" cy="17.5" r="1.5"/></>,
        package: <><path d="M21 8v8l-9 5-9-5V8l9-5 9 5z"/><path d="M3.3 7L12 12l8.7-5"/><path d="M12 22V12"/></>,
        scan: <><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M3 12h18"/></>,
        check: <path d="M20 6L9 17l-5-5"/>,
        x: <><path d="M18 6L6 18"/><path d="M6 6l12 12"/></>,
        alert: <><path d="M10.3 3.9L1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>,
        search: <><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>,
        zoomin: <><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/><path d="M11 8v6"/><path d="M8 11h6"/></>,
        send: <><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></>,
        upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></>,
        building: <><rect x="4" y="2" width="16" height="20" rx="1"/><path d="M9 22v-4h6v4"/></>,
        shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></>,
        camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.2"/></>,
      }[name];
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{p}</svg>;
    }

    function QR({ value, size = 56 }) {
      const ref = useRef(null);
      useEffect(() => { if (ref.current && window.QRious) { new QRious({ element: ref.current, value, size, level: "M" }); } }, [value, size]);
      return <canvas ref={ref} className="rounded bg-white border border-slate-100" style={{ width: size, height: size }} />;
    }

    const STAGES = ["ny", "rekvirert", "sendt", "mottatt", "klar"];
    const STAGE_LABEL = { ny: "Ny ordre", rekvirert: "Rekvirert", sendt: "Sendt fra Mur og Tak", mottatt: "Mottatt på lager", klar: "Klar til utlevering" };
    const HEAD = { ny: "bg-slate-200 text-slate-700", rekvirert: "bg-amber-100 text-amber-800", sendt: "bg-blue-100 text-blue-800", mottatt: "bg-emerald-100 text-emerald-800", klar: "bg-teal-100 text-teal-800" };
    const DOT = { ny: "bg-slate-400", rekvirert: "bg-amber-500", sendt: "bg-blue-500", mottatt: "bg-emerald-500", klar: "bg-teal-500" };
    const PROD = { "Silco Maling": "bg-sky-100 text-sky-800", "Silco Puss": "bg-orange-100 text-orange-800", "Weberton 303": "bg-violet-100 text-violet-800" };
    const ONTRACK_RANK = { "Forsinket": 0, "Risiko": 1, "Følg opp": 2, "I rute": 3, "Klar": 4 };

    const ROLES = {
      kundesenter: { label: "Ordrekontor", icon: "eye", extern: false },
      vareforsyning: { label: "Vareforsyning", icon: "clipboard", extern: false },
      murogtak: { label: "Mur og Tak", icon: "truck", extern: true },
      borgelager: { label: "Borge Lager", icon: "package", extern: false },
    };

    const ORDER_LINES = [
      { lid: "19034501-1", id: "19034501", kunde: "Byggmester Nilsen", postnr: "0150", opprettet: "2026-05-28", dato: "2026-06-10", produkt: "Silco Maling", farge: "Hvit", kode: "33010", antall: 3, rekv: "", lev: "", status: "ny", mottatt: null },
      { lid: "19034502-1", id: "19034502", kunde: "Hansen Bygg", postnr: "1430", opprettet: "2026-05-30", dato: "2026-06-05", produkt: "Silco Maling", farge: "Rød", kode: "33020", antall: 2, rekv: "", lev: "", status: "ny", mottatt: null },
      { lid: "19034498-1", id: "19034498", kunde: "Oslo Eiendom", postnr: "0277", opprettet: "2026-05-27", dato: "2026-06-12", produkt: "Silco Puss", farge: "Lys grå", kode: "NCS S 2000-N", antall: 5, rekv: "1900142", lev: "450012345", status: "rekvirert", mottatt: null },
      { lid: "19034497-1", id: "19034497", kunde: "Vestby Sameie", postnr: "1540", opprettet: "2026-05-26", dato: "2026-06-04", produkt: "Weberton 303", farge: "Sort", kode: "NCS S 9000-N", antall: 1, rekv: "1900143", lev: "450012346", status: "rekvirert", mottatt: null },
      { lid: "19034490-1", id: "19034490", kunde: "Lien & Sønn", postnr: "3045", opprettet: "2026-05-25", dato: "2026-06-09", produkt: "Silco Maling", farge: "Grønn", kode: "33060", antall: 4, rekv: "1900140", lev: "450012340", status: "sendt", mottatt: null },
      { lid: "19034490-2", id: "19034490", kunde: "Lien & Sønn", postnr: "3045", opprettet: "2026-05-25", dato: "2026-06-09", produkt: "Silco Puss", farge: "Grønn", kode: "33061", antall: 2, rekv: "1900140", lev: "450012347", status: "sendt", mottatt: null },
      { lid: "19034490-3", id: "19034490", kunde: "Lien & Sønn", postnr: "3045", opprettet: "2026-05-25", dato: "2026-06-09", produkt: "Weberton 303", farge: "Grønn", kode: "33062", antall: 1, rekv: "1900140", lev: "450012348", status: "rekvirert", mottatt: null },
      { lid: "19034491-1", id: "19034491", kunde: "Sør Entreprenør", postnr: "4630", opprettet: "2026-05-29", dato: "2026-06-11", produkt: "Silco Maling", farge: "Rød", kode: "33020", antall: 2, rekv: "1900141", lev: "450012341", status: "sendt", mottatt: null },
      { lid: "19034485-1", id: "19034485", kunde: "Fjordbygg", postnr: "5003", opprettet: "2026-05-24", dato: "2026-06-08", produkt: "Silco Maling", farge: "Hvit", kode: "33010", antall: 6, rekv: "1900138", lev: "450012338", status: "mottatt", mottatt: 6 },
      { lid: "19034484-1", id: "19034484", kunde: "Moe Eiendom", postnr: "7010", opprettet: "2026-05-22", dato: "2026-06-02", produkt: "Silco Puss", farge: "Gul", kode: "33021", antall: 2, rekv: "1900137", lev: "450012337", status: "mottatt", mottatt: 2 },
      { lid: "19034480-1", id: "19034480", kunde: "Berger AS", postnr: "5251", opprettet: "2026-05-20", dato: "2026-06-06", produkt: "Weberton 303", farge: "Antrasitt", kode: "NCS S 7500-N", antall: 3, rekv: "1900135", lev: "450012335", status: "klar", mottatt: 3 },
    ];

    const TODAY = new Date("2026-06-03");
    const fmtDate = (iso) => new Date(iso).toLocaleDateString("nb-NO", { day: "numeric", month: "short" });
    const daysLeft = (iso) => Math.round((new Date(iso) - TODAY) / 86400000);
    function onTrack(o) {
      if (o.status === "klar") return { label: "Klar", cls: "bg-teal-100 text-teal-800" };
      const dl = daysLeft(o.dato), idx = STAGES.indexOf(o.status);
      if (dl < 0) return { label: "Forsinket", cls: "bg-red-100 text-red-700" };
      if (dl <= 2 && idx < 2) return { label: "Risiko", cls: "bg-red-100 text-red-700" };
      if (dl <= 4 && idx < 3) return { label: "Følg opp", cls: "bg-amber-100 text-amber-800" };
      return { label: "I rute", cls: "bg-emerald-100 text-emerald-700" };
    }
    const StatusPill = ({ status }) => <span className={"text-xs px-2 py-0.5 rounded-full font-medium whitespace-nowrap " + HEAD[status]}>{STAGE_LABEL[status]}</span>;
    const ProdTag = ({ p }) => <span className={"text-xs px-2 py-0.5 rounded-full font-medium whitespace-nowrap " + (PROD[p] || "bg-slate-100 text-slate-700")}>{p}</span>;

    const th = "text-left text-[11px] font-semibold uppercase tracking-wide text-slate-400 px-3 py-2";
    const td = "px-3 py-2.5 text-sm align-middle";

    function App() {
      const [role, setRole] = useState("kundesenter");
      const [orders, setOrders] = useState(ORDER_LINES);
      const [toast, setToast] = useState(null);
      const [highlight, setHighlight] = useState(null);
      const [scan, setScan] = useState("");
      const [search, setSearch] = useState("");
      const [koView, setKoView] = useState("kanban");
      const [koSort, setKoSort] = useState({ key: "dato", dir: "asc" });
      const [drafts, setDrafts] = useState({});
      const [counts, setCounts] = useState({});
      const [confirmed, setConfirmed] = useState({});
      const [bigQR, setBigQR] = useState(null);
      const [cam, setCam] = useState(false);
      const [camErr, setCamErr] = useState(null);
      const scannerRef = useRef(null);
      const [dragOver, setDragOver] = useState(false);
      const fileRef = useRef(null);
      const cfg = ROLES[role];

      useEffect(() => {
        if (!cam) return;
        if (!window.Html5Qrcode) { setCamErr("Kamerabiblioteket lastet ikke — sjekk nettforbindelsen."); return; }
        let active = true;
        const inst = new window.Html5Qrcode("qr-reader");
        scannerRef.current = inst;
        inst.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          (text) => { if (!active) return; active = false; inst.stop().then(() => inst.clear()).catch(() => {}); setCam(false); handleScan(text); },
          () => {}
        ).catch(() => setCamErr("Fikk ikke tilgang til kameraet. Tillat kamera i nettleseren og prøv igjen."));
        return () => { active = false; try { inst.stop().then(() => inst.clear()).catch(() => {}); } catch (e) {} };
      }, [cam]);

      function flash(type, msg) { setToast({ type, msg }); clearTimeout(flash._t); flash._t = setTimeout(() => setToast(null), 3200); }
      function setStatus(lid, status, extra) { setOrders((p) => p.map((o) => (o.lid === lid ? { ...o, status, ...(extra || {}) } : o))); }
      function lit(lid) { setHighlight(lid); setTimeout(() => setHighlight(null), 1600); }
      const qrVal = (o) => o.lid + "|" + o.kode + "|" + o.antall;

      function sendRekvisisjon(o) {
        const d = drafts[o.lid] || {}; const rekv = (d.rekv || "").trim(), lev = (d.lev || "").trim();
        if (!/^19\d{5}$/.test(rekv)) return flash("err", "Rekvisisjonsnr må være 19 + 5 siffer (f.eks. 1900142)");
        if (!/^45\d{7}$/.test(lev)) return flash("err", "Leveringsnr må være 45 + 7 siffer (f.eks. 450012345)");
        setStatus(o.lid, "rekvirert", { rekv, lev }); flash("ok", "#" + o.id + " " + o.produkt + " sendt til Mur og Tak"); lit(o.lid);
      }
      function bekreftMottatt(o) {
        const c = counts[o.lid] == null ? o.antall : Number(counts[o.lid]);
        setStatus(o.lid, "mottatt", { mottatt: c });
        if (c !== o.antall) flash("warn", "#" + o.id + ": mottok " + c + " av " + o.antall + " spann — avvik notert");
        else flash("ok", "#" + o.id + " mottatt — " + c + " spann OK");
        lit(o.lid);
      }
      function handleScan(v) {
        const val = String(v).trim(); if (!val) return; setScan(""); const key = val.split("|")[0];
        let m = orders.filter((o) => o.lid === key);
        if (m.length === 0) m = orders.filter((o) => o.id === key || o.kode === key);
        if (m.length === 0) return flash("err", "Ingen ordre funnet for «" + val + "»");
        if (m.length > 1) return flash("warn", m.length + " batcher matcher — skann QR-etiketten på spannet");
        const o = m[0]; lit(o.lid);
        if (o.status === "sendt") {
          setConfirmed((c) => ({ ...c, [o.lid]: true }));
          flash("ok", "#" + o.id + " " + o.produkt + " skannet — bekrefter…");
          setTimeout(() => { bekreftMottatt(o); setConfirmed((c) => { const n = { ...c }; delete n[o.lid]; return n; }); }, 1400);
        } else flash("info", "#" + o.id + " · " + o.produkt + " · " + STAGE_LABEL[o.status]);
      }
      function parseFile(file) {
        const r = new FileReader();
        r.onload = (e) => {
          try {
            const wb = XLSX.read(e.target.result, { type: "array" });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
            const find = (row, keys) => { const k = Object.keys(row).find((kk) => keys.some((t) => kk.toLowerCase().replace(/\s|\./g, "").includes(t))); return k ? row[k] : ""; };
            const mapped = rows.map((r2, i) => {
              const id = String(find(r2, ["ordrenr", "ordre", "ordernr"]) || ("?" + (i + 1)));
              return {
                lid: id + "-" + (i + 1), id,
                kunde: String(find(r2, ["kunde", "customer"]) || "—"),
                postnr: String(find(r2, ["postnr", "postnummer", "zip"]) || ""),
                opprettet: String(find(r2, ["opprettet", "created", "bestilt"]) || "2026-06-01"),
                dato: String(find(r2, ["leveringsdato", "frist", "date"]) || "2026-06-10"),
                produkt: String(find(r2, ["produkt", "product", "type"]) || "Silco Maling"),
                farge: String(find(r2, ["farge", "color"]) || "—"),
                kode: String(find(r2, ["fargekode", "kode", "ncs"]) || ""),
                antall: Number(find(r2, ["antall", "qty", "stk"]) || 1) || 1,
                rekv: String(find(r2, ["rekvisisjon", "rekv"]) || ""),
                lev: String(find(r2, ["leveringsnr", "levering", "delivery"]) || ""),
                status: String(find(r2, ["status"]) || "ny").toLowerCase().replace(/\s/g, "") || "ny",
                mottatt: null,
              };
            }).filter((x) => x.id);
            if (!mapped.length) return flash("err", "Fant ingen rader i fila");
            const valid = new Set(STAGES);
            setOrders(mapped.map((m) => (valid.has(m.status) ? m : { ...m, status: "ny" })));
            flash("ok", "Lastet inn " + mapped.length + " ordrelinjer fra " + file.name);
          } catch (err) { flash("err", "Klarte ikke å lese fila"); }
        };
        r.readAsArrayBuffer(file);
      }
      const rowCls = (lid) => "border-t border-slate-100 " + (highlight === lid ? "bg-emerald-50" : "");

      // ---------- ORDREKONTOR ----------
      function Ordrekontor() {
        const q = search.toLowerCase();
        const list = orders.filter((o) => !q || o.id.includes(q) || o.kunde.toLowerCase().includes(q) || o.kode.toLowerCase().includes(q) || o.farge.toLowerCase().includes(q) || o.produkt.toLowerCase().includes(q));
        const dir = koSort.dir === "asc" ? 1 : -1;
        const sval = (o, k) => k === "id" ? Number(o.id) : k === "antall" ? o.antall : k === "opprettet" ? new Date(o.opprettet).getTime() : k === "dato" ? new Date(o.dato).getTime() : k === "status" ? STAGES.indexOf(o.status) : k === "ontrack" ? (ONTRACK_RANK[onTrack(o).label] ?? 9) : String(o[k] || "").toLowerCase();
        const sortedList = [...list].sort((a, b) => { const av = sval(a, koSort.key), bv = sval(b, koSort.key); return av < bv ? -dir : av > bv ? dir : 0; });
        const SortTh = ({ k, label }) => (
          <th onClick={() => setKoSort((s) => ({ key: k, dir: s.key === k && s.dir === "asc" ? "desc" : "asc" }))} className={th + " cursor-pointer select-none hover:text-slate-600"}>
            <span className="inline-flex items-center gap-1">{label}{koSort.key === k && <span className="text-slate-500">{koSort.dir === "asc" ? "▲" : "▼"}</span>}</span>
          </th>
        );
        const koList = (
          <div className="rounded-xl bg-white border border-slate-200 overflow-x-auto">
            <table className="w-full min-w-[1000px]">
              <thead><tr>
                <SortTh k="id" label="Ordre" /><SortTh k="kunde" label="Kunde" /><SortTh k="produkt" label="Produkt" /><SortTh k="farge" label="Farge" />
                <SortTh k="antall" label="Antall" /><SortTh k="opprettet" label="Opprettet" /><SortTh k="dato" label="Frist" /><SortTh k="status" label="Status" /><SortTh k="ontrack" label="På vei?" />
              </tr></thead>
              <tbody>
                {sortedList.map((o) => {
                  const ot = onTrack(o), dl = daysLeft(o.dato);
                  return (
                    <tr key={o.lid} className={rowCls(o.lid)}>
                      <td className={td + " font-mono font-bold whitespace-nowrap"}>#{o.id}</td>
                      <td className={td}>{o.kunde}</td>
                      <td className={td}><ProdTag p={o.produkt} /></td>
                      <td className={td}><span className="font-medium">{o.farge}</span> <span className="text-slate-400 font-mono text-xs">{o.kode}</span></td>
                      <td className={td + " font-mono"}>{o.antall}</td>
                      <td className={td + " whitespace-nowrap"}>{fmtDate(o.opprettet)}</td>
                      <td className={td + " whitespace-nowrap"}>{fmtDate(o.dato)} <span className="text-slate-400 text-xs">({dl < 0 ? dl : "+" + dl}d)</span></td>
                      <td className={td}><StatusPill status={o.status} /></td>
                      <td className={td}><span className={"text-xs px-2 py-0.5 rounded-full font-semibold " + ot.cls}>{ot.label}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
        return (
          <div>
            <div className="mb-3 flex items-center justify-between gap-2 flex-wrap">
              <div className="flex items-center gap-2 rounded-lg bg-white border border-slate-200 px-3 py-2 flex-1 max-w-md">
                <Icon name="search" size={16} className="text-slate-400" />
                <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Søk ordre, kunde, produkt, fargekode…" className="flex-1 bg-transparent outline-none text-sm" />
              </div>
              <div className="flex bg-slate-200 p-1 rounded-lg">
                <button onClick={() => setKoView("kanban")} className={"px-3 py-1.5 rounded-md text-sm font-medium " + (koView === "kanban" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600")}>Kanban</button>
                <button onClick={() => setKoView("list")} className={"px-3 py-1.5 rounded-md text-sm font-medium " + (koView === "list" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600")}>Liste</button>
              </div>
            </div>
            {koView === "list" && koList}
            {koView === "kanban" &&
            <div className="flex gap-3 overflow-x-auto pb-3">
              {STAGES.map((s) => {
                const col = list.filter((o) => o.status === s).sort((a, b) => new Date(a.dato) - new Date(b.dato));
                return (
                  <div key={s} className="shrink-0 w-[264px]">
                    <div className={"flex items-center justify-between px-3 py-2 rounded-lg text-sm font-semibold " + HEAD[s]}>
                      <span className="flex items-center gap-2"><span className={"w-2 h-2 rounded-full " + DOT[s]} />{STAGE_LABEL[s]}</span>
                      <span className="text-xs opacity-70">{col.length}</span>
                    </div>
                    <div className="mt-2 flex flex-col gap-2">
                      {col.length === 0 && <div className="text-xs text-slate-400 px-3 py-6 text-center border border-dashed border-slate-200 rounded-lg">Ingen</div>}
                      {col.map((o) => {
                        const ot = onTrack(o), dl = daysLeft(o.dato);
                        return (
                          <div key={o.lid} className={"rounded-lg border bg-white p-3 " + (highlight === o.lid ? "border-emerald-400 ring-2 ring-emerald-200" : "border-slate-200")}>
                            <div className="flex items-center justify-between">
                              <span className="font-mono font-bold text-sm">#{o.id}</span>
                              <span className={"text-xs px-2 py-0.5 rounded-full font-semibold " + ot.cls}>{ot.label}</span>
                            </div>
                            <div className="mt-1.5"><ProdTag p={o.produkt} /></div>
                            <div className="mt-1.5 text-sm font-medium">{o.farge} <span className="text-slate-400 font-mono text-xs">{o.kode}</span></div>
                            <div className="mt-0.5 text-xs text-slate-500 flex items-center gap-1"><Icon name="building" size={12} /> {o.kunde}</div>
                            <div className="mt-2 text-xs text-slate-600 flex items-center justify-between border-t border-slate-100 pt-2">
                              <span>Frist <b>{fmtDate(o.dato)}</b></span>
                              <span className="text-slate-400">{dl < 0 ? dl + "d" : "+" + dl + "d"}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            }
          </div>
        );
      }

      // ---------- VAREFORSYNING ----------
      function Vareforsyning() {
        const sorted = [...orders].sort((a, b) => (a.status === "ny" ? -1 : 1) - (b.status === "ny" ? -1 : 1));
        return (
          <div className="rounded-xl bg-white border border-slate-200 overflow-x-auto">
            <table className="w-full min-w-[980px]">
              <thead><tr><th className={th}>Ordre</th><th className={th}>Produkt</th><th className={th}>Farge</th><th className={th}>Antall</th><th className={th}>Rekvisisjon (19xxxxx)</th><th className={th}>Leveringsnr (45xxxxxxx)</th><th className={th}>Handling</th></tr></thead>
              <tbody>
                {sorted.map((o) => {
                  const d = drafts[o.lid] || {}; const isNy = o.status === "ny";
                  return (
                    <tr key={o.lid} className={rowCls(o.lid)}>
                      <td className={td + " font-mono font-bold whitespace-nowrap"}>#{o.id}</td>
                      <td className={td}><ProdTag p={o.produkt} /></td>
                      <td className={td}><span className="font-medium">{o.farge}</span> <span className="text-slate-400 font-mono text-xs">{o.kode}</span></td>
                      <td className={td + " font-mono"}>{o.antall}</td>
                      <td className={td}>{isNy ? <input value={d.rekv || ""} onChange={(e) => setDrafts({ ...drafts, [o.lid]: { ...d, rekv: e.target.value } })} placeholder="1900…" className="w-28 border border-slate-300 rounded px-2 py-1 text-sm font-mono" /> : <span className="font-mono">{o.rekv || "—"}</span>}</td>
                      <td className={td}>{isNy ? <input value={d.lev || ""} onChange={(e) => setDrafts({ ...drafts, [o.lid]: { ...d, lev: e.target.value } })} placeholder="4500…" className="w-32 border border-slate-300 rounded px-2 py-1 text-sm font-mono" /> : <span className="font-mono">{o.lev || "—"}</span>}</td>
                      <td className={td}>{isNy ? <button onClick={() => sendRekvisisjon(o)} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800"><Icon name="send" size={14} /> Send til Mur og Tak</button> : <StatusPill status={o.status} />}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      }

      // ---------- MUR OG TAK ----------
      function MurOgTak() {
        const queue = orders.filter((o) => o.status === "rekvirert");
        const done = orders.filter((o) => STAGES.indexOf(o.status) > STAGES.indexOf("rekvirert"));
        return (
          <div>
            <div className="mb-4 flex items-start gap-3 rounded-lg border border-amber-300 bg-amber-50 px-4 py-3">
              <Icon name="shield" size={18} className="text-amber-600 shrink-0 mt-0.5" />
              <div className="text-sm text-amber-900"><span className="font-semibold">Ekstern partner — begrenset innsyn.</span> Mur og Tak ser kun rekvisisjon, ordrenr, produkt, fargekode og antall. QR-etiketten inneholder ingen kundedata.</div>
            </div>
            <div className="rounded-xl bg-white border border-slate-200 overflow-x-auto">
              <table className="w-full min-w-[840px]">
                <thead><tr><th className={th}>Etikett</th><th className={th}>Rekvisisjon</th><th className={th}>Ordre</th><th className={th}>Produkt</th><th className={th}>Fargekode</th><th className={th}>Antall</th><th className={th}>Handling</th></tr></thead>
                <tbody>
                  {queue.length === 0 && <tr><td className={td + " text-slate-400"} colSpan="7">Ingen nye rekvisisjoner</td></tr>}
                  {queue.map((o) => (
                    <tr key={o.lid} className={rowCls(o.lid)}>
                      <td className={td}><QR value={qrVal(o)} size={56} /></td>
                      <td className={td + " font-mono font-bold"}>{o.rekv}</td>
                      <td className={td + " font-mono"}>#{o.id}</td>
                      <td className={td}><ProdTag p={o.produkt} /></td>
                      <td className={td}><span className="font-mono font-semibold">{o.kode}</span> <span className="text-slate-400 text-xs">{o.farge}</span></td>
                      <td className={td + " font-mono"}>{o.antall} spann</td>
                      <td className={td}><button onClick={() => { setStatus(o.lid, "sendt"); flash("ok", "#" + o.id + " " + o.produkt + " sendt til Borge Lager"); lit(o.lid); }} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800"><Icon name="truck" size={14} /> Sendt til Borge Lager</button></td>
                    </tr>
                  ))}
                  {done.map((o) => (
                    <tr key={o.lid} className="border-t border-slate-100 text-slate-400">
                      <td className={td}><Icon name="check" size={16} className="text-slate-300" /></td>
                      <td className={td + " font-mono"}>{o.rekv}</td>
                      <td className={td + " font-mono"}>#{o.id}</td>
                      <td className={td}>{o.produkt}</td>
                      <td className={td + " font-mono"}>{o.kode}</td>
                      <td className={td + " font-mono"}>{o.antall}</td>
                      <td className={td}><span className="text-xs">Sendt ✓</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      // ---------- BORGE LAGER ----------
      function BorgeLager() {
        const incoming = orders.filter((o) => o.status === "sendt").sort((a, b) => new Date(a.dato) - new Date(b.dato));
        const toPlace = orders.filter((o) => o.status === "mottatt").sort((a, b) => new Date(a.dato) - new Date(b.dato));
        return (
          <div>
            <div className="mb-4 rounded-xl bg-white border border-slate-200 p-3 flex items-center gap-3">
              <Icon name="scan" size={20} className="text-slate-400" />
              <input value={scan} onChange={(e) => setScan(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") handleScan(scan); }} autoFocus placeholder="Skann QR-etiketten på spannet for å finne rett ordre" className="flex-1 bg-transparent outline-none text-sm" />
              <button onClick={() => { setCamErr(null); setCam(true); }} className="px-3 py-2 rounded-lg border border-slate-300 text-slate-700 text-sm font-semibold hover:bg-slate-50 inline-flex items-center gap-1.5"><Icon name="camera" size={16} /> Kamera</button>
              <button onClick={() => handleScan(scan)} className="px-4 py-2 rounded-lg bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800">Skann</button>
            </div>

            <div className="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Innkommende — skann, sjekk antall, bekreft</div>
            <div className="rounded-xl bg-white border border-slate-200 overflow-x-auto mb-6">
              <table className="w-full min-w-[820px]">
                <thead><tr><th className={th}>Etikett</th><th className={th}>Ordre</th><th className={th}>Produkt</th><th className={th}>Fargekode</th><th className={th}>Forventet</th><th className={th}>Mottatt</th><th className={th}>Handling</th></tr></thead>
                <tbody>
                  {incoming.length === 0 && <tr><td className={td + " text-slate-400"} colSpan="7">Ingen pakker på vei</td></tr>}
                  {incoming.map((o) => {
                    const c = counts[o.lid] == null ? o.antall : counts[o.lid]; const mismatch = Number(c) !== o.antall;
                    return (
                      <tr key={o.lid} className={rowCls(o.lid)}>
                        <td className={td}>
                          <div className="flex items-center gap-2">
                            <QR value={qrVal(o)} size={56} />
                            <button onClick={() => setBigQR({ value: qrVal(o), title: "#" + o.id, sub: o.produkt + " · " + o.kode + " · " + o.antall + " spann" })} title="Forstørr QR" className="p-1.5 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50"><Icon name="zoomin" size={16} /></button>
                          </div>
                        </td>
                        <td className={td + " font-mono font-bold"}>#{o.id}</td>
                        <td className={td}><ProdTag p={o.produkt} /></td>
                        <td className={td}><span className="font-mono font-semibold">{o.kode}</span> <span className="text-slate-400 text-xs">{o.farge}</span></td>
                        <td className={td + " font-mono"}>{o.antall} spann</td>
                        <td className={td}><input type="number" value={c} onChange={(e) => setCounts({ ...counts, [o.lid]: e.target.value })} className={"w-20 border rounded px-2 py-1 text-sm font-mono " + (mismatch ? "border-red-400 text-red-600" : "border-slate-300")} /></td>
                        <td className={td}>{confirmed[o.lid]
                          ? <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-emerald-600 text-white text-sm font-semibold"><Icon name="check" size={14} /> Bekreftet</span>
                          : <button onClick={() => bekreftMottatt(o)} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800"><Icon name="package" size={14} /> Bekreft mottatt</button>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div className="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Mottatt — plasser med riktig ordre</div>
            <div className="rounded-xl bg-white border border-slate-200 overflow-x-auto">
              <table className="w-full min-w-[720px]">
                <thead><tr><th className={th}>Ordre</th><th className={th}>Produkt</th><th className={th}>Fargekode</th><th className={th}>Antall</th><th className={th}>Handling</th></tr></thead>
                <tbody>
                  {toPlace.length === 0 && <tr><td className={td + " text-slate-400"} colSpan="5">Ingenting å plassere</td></tr>}
                  {toPlace.map((o) => (
                    <tr key={o.lid} className={rowCls(o.lid)}>
                      <td className={td + " font-mono font-bold"}>#{o.id}</td>
                      <td className={td}><ProdTag p={o.produkt} /></td>
                      <td className={td}><span className="font-mono font-semibold">{o.kode}</span> <span className="text-slate-400 text-xs">{o.farge}</span></td>
                      <td className={td + " font-mono"}>{o.mottatt} spann</td>
                      <td className={td}><button onClick={() => { setStatus(o.lid, "klar"); flash("ok", "#" + o.id + " " + o.produkt + " plassert og klar"); lit(o.lid); }} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md bg-teal-600 text-white text-sm font-semibold hover:bg-teal-700"><Icon name="check" size={14} /> Plassert – klar</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      const canUpload = role === "kundesenter" || role === "vareforsyning";

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900" style={{ fontFamily: "ui-sans-serif, system-ui" }}>
          <header className="bg-slate-900 text-white">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded bg-amber-400 flex items-center justify-center text-slate-900 font-black">M</div>
                <div><div className="font-bold leading-tight">Malingssporing</div><div className="text-xs text-slate-400">Ordre → rekvisisjon → blanding → lager → utlevering</div></div>
              </div>
              <div className="flex gap-1 bg-slate-800 p-1 rounded-lg flex-wrap">
                {Object.entries(ROLES).map(([k, r]) => (
                  <button key={k} onClick={() => setRole(k)} className={"flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-medium transition " + (k === role ? "bg-white text-slate-900" : "text-slate-300 hover:text-white")}>
                    <Icon name={r.icon} size={15} /> {r.label}{r.extern && <span className="ml-1 text-[10px] px-1 py-0.5 rounded bg-amber-400 text-slate-900 font-bold">EKST</span>}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-5">
            {canUpload && (
              <div onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={(e) => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f) parseFile(f); }} onClick={() => fileRef.current && fileRef.current.click()} className={"mb-5 cursor-pointer rounded-xl border-2 border-dashed px-4 py-3 flex items-center gap-3 transition " + (dragOver ? "border-amber-400 bg-amber-50" : "border-slate-300 bg-white hover:border-slate-400")}>
                <div className="w-9 h-9 rounded-lg bg-slate-900 text-white flex items-center justify-center shrink-0"><Icon name="upload" size={18} /></div>
                <div className="text-sm"><div className="font-semibold text-slate-800">Last opp dagens ordre fra SAP</div><div className="text-slate-500 text-xs">Dra Excel-fila hit, eller klikk. Én rad per produktlinje: ordrenr, kunde, postnr, produkt, fargekode, antall, opprettet, leveringsdato.</div></div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={(e) => { const f = e.target.files[0]; if (f) parseFile(f); }} />
              </div>
            )}

            <div className="flex items-center gap-2 text-sm text-slate-600 mb-4"><Icon name={cfg.icon} size={16} className="text-slate-400" /><span className="font-semibold text-slate-800">{cfg.label}</span></div>

            {role === "kundesenter" && <Ordrekontor />}
            {role === "vareforsyning" && <Vareforsyning />}
            {role === "murogtak" && <MurOgTak />}
            {role === "borgelager" && <BorgeLager />}
          </main>

          {bigQR && (
            <div onClick={() => setBigQR(null)} className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,.55)" }}>
              <div onClick={(e) => e.stopPropagation()} className="bg-white rounded-2xl p-6 w-full max-w-sm text-center relative">
                <button onClick={() => setBigQR(null)} className="absolute top-3 right-3 text-slate-400 hover:text-slate-700"><Icon name="x" size={20} /></button>
                <div className="flex justify-center mb-3"><QR value={bigQR.value} size={260} /></div>
                <div className="font-mono font-bold text-lg">{bigQR.title}</div>
                <div className="text-sm text-slate-500">{bigQR.sub}</div>
                <div className="mt-2 text-xs text-slate-400 font-mono break-all">{bigQR.value}</div>
              </div>
            </div>
          )}

          {cam && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,.75)" }}>
              <div className="bg-white rounded-2xl p-4 w-full max-w-sm relative">
                <button onClick={() => { setCam(false); setCamErr(null); }} className="absolute top-3 right-3 text-slate-400 hover:text-slate-700 z-10"><Icon name="x" size={20} /></button>
                <div className="text-sm font-semibold mb-2 flex items-center gap-2"><Icon name="camera" size={16} /> Skann QR med kamera</div>
                <div id="qr-reader" className="w-full rounded-lg overflow-hidden bg-slate-900" style={{ minHeight: 260 }}></div>
                {camErr ? <div className="mt-2 text-sm text-red-600">{camErr}</div>
                        : <div className="mt-2 text-xs text-slate-500">Pek kameraet mot QR-koden på spannet — den fylles inn automatisk.</div>}
              </div>
            </div>
          )}

          {toast && (
            <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-50">
              <div className={"flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white " + (toast.type === "ok" ? "bg-emerald-600" : toast.type === "err" ? "bg-red-600" : toast.type === "warn" ? "bg-amber-600" : "bg-slate-800")}>
                {toast.type === "ok" && <Icon name="check" size={16} />}{toast.type === "err" && <Icon name="x" size={16} />}{toast.type === "warn" && <Icon name="alert" size={16} />}{toast.msg}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
